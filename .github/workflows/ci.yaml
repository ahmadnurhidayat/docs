name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '20'

jobs:
  check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Astro type check
        run: npx astro check

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Astro build cache
        uses: actions/cache@v5
        with:
          path: .astro
          key: astro-${{ hashFiles('src/**', 'content/**', 'astro.config.mjs', 'package-lock.json') }}
          restore-keys: astro-

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Validate output
        run: |
          [ -f dist/index.html ] || { echo "Missing dist/index.html"; exit 1; }
          PAGE_COUNT=$(find dist -name '*.html' | wc -l | tr -d ' ')
          TOTAL_SIZE=$(du -sh dist/ | cut -f1)
          echo "Pages built: ${PAGE_COUNT}"
          echo "Total size:  ${TOTAL_SIZE}"
          [ -d dist/pagefind ] && echo "Pagefind index: $(du -sh dist/pagefind/ | cut -f1)"
          echo "page_count=${PAGE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "total_size=${TOTAL_SIZE}" >> "$GITHUB_OUTPUT"
        id: validate

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.sha }}
          path: dist/
          retention-days: ${{ github.event_name == 'pull_request' && 3 || 7 }}
          if-no-files-found: error

      - name: Comment build summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- ci-build-summary -->';
            const existing = comments.find(c => c.body.includes(marker));

            const body = [
              marker,
              '## 🏗️ Build Summary',
              '',
              '| | |',
              '|---|---|',
              `| **Status** | ✅ Passed |`,
              `| **Pages built** | ${{ steps.validate.outputs.page_count }} |`,
              `| **Total size** | ${{ steps.validate.outputs.total_size }} |`,
              `| **Artifact** | \`build-pr-${{ github.event.pull_request.number }}\` (3-day retention) |`,
              `| **Commit** | ${{ github.sha }} |`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
