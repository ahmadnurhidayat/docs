name: Test and Build Astro Site

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Skip test execution'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '20'
  CACHE_KEY_PREFIX: 'node-cache-v1'

jobs:
  # Code Quality & Linting
  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run Astro Check
        run: npx astro check
        continue-on-error: true

      - name: Cache Lint Results
        uses: actions/cache@v4
        with:
          path: .cache/lint
          key: ${{ env.CACHE_KEY_PREFIX }}-lint-${{ hashFiles('src/**/*.{astro,ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-lint-

  # Unit & Integration Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !inputs.skip-tests }}
    needs: [lint]

    strategy:
      matrix:
        node-version: [20]
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run Test Suite
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm run test
          else
            echo "No test script found, skipping..."
          fi
        continue-on-error: true

      - name: Generate Test Report
        if: always()
        run: echo "Test execution completed on Node.js ${{ matrix.node-version }}"

  # Build Astro Site
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Astro Build
        uses: actions/cache@v4
        with:
          path: |
            .astro
            dist
          key: ${{ env.CACHE_KEY_PREFIX }}-astro-build-${{ hashFiles('src/**', 'astro.config.mjs') }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-astro-build-

      - name: Build Astro Site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Display Build Statistics
        run: |
          echo "Build Output Size:"
          du -sh dist/
          echo "Generated Files:"
          find dist -type f | wc -l
          if [ -d "dist/pagefind" ]; then
            echo "Pagefind Index:"
            du -sh dist/pagefind/
          fi

      - name: Validate Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "Build failed: index.html not found"
            exit 1
          fi
          if [ ! -d "dist/_assets" ]; then
            echo "Warning: _assets directory not found"
          fi
          echo "Build validation passed"

      - name: Upload Build as Artifact (PR Preview)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-build-${{ github.event.pull_request.number }}
          path: ./dist
          retention-days: 3
