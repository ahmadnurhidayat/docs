name: Secret Scanning Guard

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: Scan Repository History
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Fetch all history so TruffleHog can inspect previous commits in the branch
          fetch-depth: 0

      - name: TruffleHog OSS Scan
        id: scan
        uses: trufflesecurity/trufflehog@v3.82.0
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --json
        # Continue so we can upload the report even on findings
        continue-on-error: true

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report-${{ github.run_id }}
          path: trufflehog-report.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Comment scan result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.scan.outcome }}';
            const marker = '<!-- trufflehog-scan-result -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            const passed = outcome !== 'failure';
            const body = [
              marker,
              `## ${passed ? '✅' : '🚨'} Secret Scanning — ${passed ? 'No verified secrets found' : 'Verified secrets detected'}`,
              '',
              passed
                ? 'TruffleHog scanned the commit history and found no verified secrets.'
                : '> **Action required:** TruffleHog found one or more verified secrets in this PR. Review the `trufflehog-report` artifact and rotate any exposed credentials immediately.',
              '',
              `**Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Fail the job after reporting if secrets were found
      - name: Fail on detected secrets
        if: steps.scan.outcome == 'failure'
        run: |
          echo "::error::TruffleHog detected verified secrets. See the trufflehog-report artifact for details."
          exit 1
